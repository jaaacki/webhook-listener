<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Webhook Listener</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #151924;
      --panel-2: #1b2130;
      --text: #e6e9ef;
      --muted: #9aa3b2;
      --accent: #6de1ff;
      --accent-2: #8bffb0;
      --border: #2a3245;
      --pre-bg: #0c0f17;
      --event-active: #222a3d;
      --pill-bg: #1b2a3d;
      --pill-border: #2f4764;
      --header-bg: rgba(10, 12, 16, 0.8);
      --radial-color: #1f2a44;
      --hook-url-bg: #0b0f17;
    }

    [data-theme="light"] {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-2: #f0f2f5;
      --text: #1a1d24;
      --muted: #5c6370;
      --accent: #0077b6;
      --accent-2: #00a676;
      --border: #dde1e7;
      --pre-bg: #f8f9fb;
      --event-active: #e8f4ff;
      --pill-bg: #e1f0ff;
      --pill-border: #b8d4f0;
      --header-bg: rgba(255, 255, 255, 0.9);
      --radial-color: #dbe4f0;
      --hook-url-bg: #e8edf5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Space Grotesk", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 80% -20%, var(--radial-color) 0%, transparent 60%), var(--bg);
      color: var(--text);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .panel,
    header,
    pre,
    select,
    .event,
    .hook-url,
    .pill {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(6px);
    }

    .title {
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .title-wrap {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hook-url {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      color: var(--accent);
      background: var(--hook-url-bg);
      border: 1px solid var(--border);
      padding: 3px 6px;
      border-radius: 6px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .ns-group {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--panel-2);
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .ns-group label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      min-width: 100px;
      cursor: pointer;
    }

    select:hover {
      border-color: var(--accent);
    }

    .btn {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      color: var(--text);
      font-size: 11px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: var(--panel);
      border-color: var(--accent);
    }

    .btn-danger {
      color: #ff6b6b;
      border-color: #ff6b6b40;
    }

    .btn-danger:hover {
      background: #ff6b6b20;
      border-color: #ff6b6b;
    }

    .btn-confirm {
      background: #ff6b6b;
      color: white;
      border-color: #ff6b6b;
    }

    .btn-confirm:hover {
      background: #ff5252;
    }

    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      padding: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel header {
      position: static;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
    }

    .events {
      max-height: calc(100vh - 140px);
      overflow: auto;
    }

    .event {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      font-size: 12px;
    }

    .event.active {
      background: var(--event-active);
      border-left: 3px solid var(--accent);
    }

    .event small {
      color: var(--muted);
      font-size: 10px;
    }

    .detail {
      padding: 12px;
      display: grid;
      gap: 12px;
      font-size: 12px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }

    .table th,
    .table td {
      text-align: left;
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      font-size: 12px;
    }

    .table th {
      color: var(--muted);
      font-weight: 500;
      width: 200px;
      font-size: 11px;
      white-space: nowrap;
    }

    h3 {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: var(--text);
    }

    pre {
      background: var(--pre-bg);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      max-height: 360px;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--pill-bg);
      color: var(--accent);
      border: 1px solid var(--pill-border);
      margin-left: 6px;
    }

    .theme-toggle {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      font-size: 14px;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .theme-toggle:hover {
      background: var(--panel);
      transform: scale(1.02);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .payload-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }

      .events {
        max-height: 300px;
      }
    }

    @media (max-width: 1100px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
</head>

<body>
  <header>
    <div class="title-wrap">
      <div class="title">Webhook Listener</div>
      <div id="hookUrl" class="hook-url">/hook/</div>
    </div>
    <div class="controls">
      <div class="ns-group">
        <label for="ns">Namespace</label>
        <select id="ns"></select>
      </div>
      <span id="status" class="pill">offline</span>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
        <svg id="themeIcon" viewBox="0 0 24 24"></svg>
      </button>
    </div>
  </header>
  <main>
    <section class="panel">
      <header style="display: flex; justify-content: space-between; align-items: center;">
        <div class="title">Events</div>
        <button id="clearBtn" class="btn btn-danger">Clear</button>
      </header>
      <div id="events" class="events"></div>
    </section>
    <section class="panel">
      <header>
        <div class="title">Details</div>
      </header>
      <div class="detail">
        <div class="detail-grid">
          <section>
            <h3>Request Details</h3>
            <table class="table" id="meta"></table>
          </section>
          <section>
            <h3>Headers</h3>
            <table class="table" id="headers"></table>
          </section>
        </div>
        <div class="detail-grid">
          <section>
            <h3>Query Strings</h3>
            <table class="table" id="query"></table>
          </section>
          <section>
            <h3>Form Values</h3>
            <table class="table" id="form"></table>
          </section>
        </div>
        <section>
          <h3>Request Content</h3>
          <div class="payload-tools">
            <div>
              <label class="toggle"><input type="checkbox" id="formatJson" checked /> Format JSON</label>
              <label class="toggle"><input type="checkbox" id="wrap" checked /> Word Wrap</label>
            </div>
            <div class="muted" id="payloadMeta"></div>
          </div>
          <pre id="payload"></pre>
        </section>
      </div>
    </section>
  </main>
  <script>
    const nsSelect = document.getElementById("ns");
    const eventsEl = document.getElementById("events");
    const metaEl = document.getElementById("meta");
    const queryEl = document.getElementById("query");
    const formEl = document.getElementById("form");
    const headersEl = document.getElementById("headers");
    const payloadEl = document.getElementById("payload");
    const payloadMetaEl = document.getElementById("payloadMeta");
    const formatJsonEl = document.getElementById("formatJson");
    const wrapEl = document.getElementById("wrap");
    const statusEl = document.getElementById("status");
    const hookUrlEl = document.getElementById("hookUrl");
    const clearBtn = document.getElementById("clearBtn");

    let events = [];
    let currentNs = "";
    let activeId = "";
    let confirmClear = false;
    let confirmTimeout = null;

    function setStatus(text, ok) {
      statusEl.textContent = text;
      statusEl.style.color = ok ? "var(--accent-2)" : "var(--accent)";
    }

    // HTML escape function to prevent XSS
    function esc(str) {
      if (str === null || str === undefined) return "";
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderEvents() {
      eventsEl.innerHTML = "";
      events.slice().reverse().forEach((evt) => {
        const div = document.createElement("div");
        div.className = "event";
        if (evt.id === activeId) {
          div.classList.add("active");
        }
        div.innerHTML = `<div><strong>${esc(evt.method)}</strong> <small>${esc(evt.timestamp)}</small></div>` +
          `<div><small>${esc(evt.path)}</small></div>`;
        div.onclick = () => {
          activeId = evt.id;
          showEvent(evt);
          renderEvents();
        };
        eventsEl.appendChild(div);
      });
    }

    function showEvent(evt) {
      const sizeBytes = Number(evt.sizeBytes ?? (evt.bodyRaw ? evt.bodyRaw.length : 0));
      const durationMs = Number(evt.durationMs ?? 0);
      metaEl.innerHTML = `
          <tr><th>Method</th><td>${esc(evt.method || "")}</td></tr>
          <tr><th>URL</th><td>${esc(evt.fullUrl || evt.path || "")}</td></tr>
          <tr><th>Host</th><td>${esc(evt.host || "")}</td></tr>
          <tr><th>Date</th><td>${esc(evt.timestamp || "")}</td></tr>
          <tr><th>Size</th><td>${sizeBytes} bytes</td></tr>
          <tr><th>Time</th><td>${durationMs.toFixed(3)} ms</td></tr>
          <tr><th>ID</th><td>${esc(evt.id || "")}</td></tr>
          <tr><th>Remote</th><td>${esc(evt.remoteAddress || "")}</td></tr>
          <tr><th>User-Agent</th><td>${esc(evt.userAgent || "")}</td></tr>
        `;

      const qs = evt.queryStrings || [];
      queryEl.innerHTML = qs.length
        ? qs.map((q) => `<tr><th>${esc(q.name)}</th><td>${esc(q.value)}</td></tr>`).join("")
        : `<tr><th colspan="2">None</th></tr>`;

      const formValues = evt.formValues || [];
      const formFiles = evt.formFiles || [];
      const formRows = [
        ...formValues.map((f) => `<tr><th>${esc(f.name)}</th><td>${esc(f.value)}</td></tr>`),
        ...formFiles.map(
          (f) => `<tr><th>${esc(f.name)}</th><td>${esc(f.filename)} (${esc(f.mimeType)})</td></tr>`
        )
      ];
      formEl.innerHTML = formRows.length
        ? formRows.join("")
        : `<tr><th colspan="2">None</th></tr>`;

      headersEl.innerHTML = Object.entries(evt.headers || {})
        .map(([k, v]) => `<tr><th>${esc(k)}</th><td>${esc(Array.isArray(v) ? v.join(", ") : v)}</td></tr>`)
        .join("");

      const size = sizeBytes || 0;
      payloadMetaEl.textContent = evt.contentLength
        ? `content-length: ${evt.contentLength} | ${size} bytes`
        : `${size} bytes`;

      let body = evt.bodyRaw || "";
      if (formatJsonEl.checked && body) {
        try {
          const parsed = JSON.parse(body);
          body = JSON.stringify(parsed, null, 2);
        } catch (e) {
          // Not JSON, keep as-is
        }
      }
      payloadEl.textContent = body || "(no body)";
      payloadEl.style.whiteSpace = wrapEl.checked ? "pre-wrap" : "pre";
    }

    function connect() {
      const wsUrl = `ws://${location.host}/ws`;
      const ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        setStatus("connected", true);
        hookUrlEl.textContent = `${location.origin}/hook/`;
      };

      ws.onclose = () => {
        setStatus("offline", false);
        setTimeout(connect, 2000);
      };

      ws.onerror = () => {
        setStatus("error", false);
      };

      ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if (data.type === "namespaces") {
          nsSelect.innerHTML = data.namespaces
            .map((ns) => `<option value="${esc(ns)}">${esc(ns)}</option>`)
            .join("");
          if (!currentNs && data.namespaces.length > 0) {
            currentNs = data.namespaces[0];
            nsSelect.value = currentNs;
          }
        } else if (data.type === "events") {
          events = data.events.filter((e) => e.namespace === currentNs);
          if (activeId && !events.find((e) => e.id === activeId)) {
            activeId = "";
            metaEl.innerHTML = "";
            queryEl.innerHTML = `<tr><th colspan="2">None</th></tr>`;
            formEl.innerHTML = `<tr><th colspan="2">None</th></tr>`;
            headersEl.innerHTML = "";
            payloadEl.textContent = "";
            payloadMetaEl.textContent = "";
          }
          renderEvents();
        }
      };
    }

    nsSelect.addEventListener("change", () => {
      currentNs = nsSelect.value;
      activeId = "";
      metaEl.innerHTML = "";
      queryEl.innerHTML = `<tr><th colspan="2">None</th></tr>`;
      formEl.innerHTML = `<tr><th colspan="2">None</th></tr>`;
      headersEl.innerHTML = "";
      payloadEl.textContent = "";
      payloadMetaEl.textContent = "";
      events = [];
      renderEvents();
    });

    formatJsonEl.addEventListener("change", () => {
      if (activeId) {
        const evt = events.find((e) => e.id === activeId);
        if (evt) showEvent(evt);
      }
    });

    wrapEl.addEventListener("change", () => {
      payloadEl.style.whiteSpace = wrapEl.checked ? "pre-wrap" : "pre";
    });

    clearBtn.addEventListener("click", () => {
      if (confirmClear) {
        fetch(`/api/events/${currentNs}`, { method: "DELETE" })
          .then(() => {
            events = [];
            activeId = "";
            metaEl.innerHTML = "";
            queryEl.innerHTML = `<tr><th colspan="2">None</th></tr>`;
            formEl.innerHTML = `<tr><th colspan="2">None</th></tr>`;
            headersEl.innerHTML = "";
            payloadEl.textContent = "";
            payloadMetaEl.textContent = "";
            renderEvents();
          })
          .finally(() => {
            confirmClear = false;
            clearBtn.textContent = "Clear";
            clearBtn.classList.remove("btn-confirm");
            if (confirmTimeout) clearTimeout(confirmTimeout);
          });
      } else {
        confirmClear = true;
        clearBtn.textContent = "Confirm?";
        clearBtn.classList.add("btn-confirm");
        confirmTimeout = setTimeout(() => {
          confirmClear = false;
          clearBtn.textContent = "Clear";
          clearBtn.classList.remove("btn-confirm");
        }, 3000);
      }
    });

    const moonPath =
      "M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z";
    const sunPath =
      "M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.415-2.121 2.121-1.414-1.414 2.121-2.121zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-3v-2h3zM4 11v2H1v-2h3z";

    function setTheme(theme) {
      const themeIcon = document.getElementById("themeIcon");
      if (theme === "dark") {
        document.body.removeAttribute("data-theme");
        themeIcon.innerHTML = `<path d="${moonPath}" />`;
      } else {
        document.body.setAttribute("data-theme", "light");
        themeIcon.innerHTML = `<path d="${sunPath}" />`;
      }
    }

    themeToggle.addEventListener("click", () => {
      const isDark = !document.body.hasAttribute("data-theme");
      setTheme(isDark ? "light" : "dark");
    });

    setTheme("dark");
    connect();
  </script>
</body>

</html>
